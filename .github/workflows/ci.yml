name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with pylint
      env:
        PYTHONPATH: .
      run: |
        # Run pylint explicitly on the two test files
        if [ -f "tests/test_api.py" ]; then pylint tests/test_api.py --exit-zero; fi
        if [ -f "tests/test_models.py" ]; then pylint tests/test_models.py --exit-zero; fi

    - name: Test with pytest
      env:
        PYTHONPATH: .
      run: |
        # Run specific test files explicitly
        if [ -f "tests/test_api.py" ]; then pytest tests/test_api.py; fi
        if [ -f "tests/test_models.py" ]; then pytest tests/test_models.py; fi
